<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat de apoyo — Red Segura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="telefono">

  <header>
    <button class="back-btn" onclick="history.back()">‹</button>
    <span class="icono-header">💬</span>
    <h2>Chat de apoyo</h2>
  </header>

  <div class="contenido" style="height: 680px;">

    <div class="chat-area" id="chat-area">
      <div class="burbuja asesor">
        Hola, soy tu asesora de apoyo. Estoy aquí para escucharte. ¿En qué puedo ayudarte hoy?
      </div>
    </div>

    <div class="chat-input">
      <input type="text" id="input-msg" placeholder="Escribe tu mensaje..." onkeydown="if(event.key==='Enter') enviarMensaje()">
      <button onclick="enviarMensaje()">Enviar</button>
    </div>

  </div>
</div>

<script>
  const respuestas = [
    "Entiendo cómo te sientes. Estás en un lugar seguro.",
    "Gracias por contarme. ¿Hay algo específico que necesites ahora mismo?",
    "Tu seguridad es lo más importante. ¿Estás en un lugar seguro en este momento?",
    "Recuerda que puedes llamar a la Línea 100 en cualquier momento.",
    "No estás sola/o. Tenemos recursos disponibles para ayudarte."
  ];

  let rIdx = 0;

  function enviarMensaje() {
    const input = document.getElementById("input-msg");
    const texto = input.value.trim();
    if (!texto) return;

    const area = document.getElementById("chat-area");

    const mio = document.createElement("div");
    mio.className = "burbuja usuario";
    mio.textContent = texto;
    area.appendChild(mio);

    input.value = "";

    setTimeout(() => {
      const resp = document.createElement("div");
      resp.className = "burbuja asesor";
      resp.textContent = respuestas[rIdx % respuestas.length];
      area.appendChild(resp);
      rIdx++;
      area.scrollTop = area.scrollHeight;
    }, 800);

    area.scrollTop = area.scrollHeight;
  }
</script>

</body>
</html>
