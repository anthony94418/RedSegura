<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat de apoyo — Red Segura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="telefono">

  <header>
    <button class="back-btn" onclick="history.back()">‹</button>
    <span class="icono-header">💬</span>
    <h2>Chat de apoyo</h2>
  </header>

  <div class="contenido chat-shell">

    <div class="chat-header-panel">
      <div>
        <span class="chat-online">● En línea</span>
        <h3>Asesora de apoyo</h3>
      </div>
      <span class="chat-status">respondiendo ahora</span>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="burbuja asesor">
        <span class="bubble-time">Ahora</span>
        Hola, soy tu asesora de apoyo. Estoy aquí para escucharte. ¿En qué puedo ayudarte hoy?
      </div>
    </div>

    <div class="typing-indicator" id="typing-indicator">
      <span></span><span></span><span></span>
    </div>

    <div class="quick-options">
      <button class="quick-chip" onclick="responderRapido('Necesito ayuda ahora')">Necesito ayuda ahora</button>
      <button class="quick-chip" onclick="responderRapido('Quiero hablar con alguien')">Quiero hablar con alguien</button>
      <button class="quick-chip" onclick="responderRapido('Estoy asustada')">Estoy asustada</button>
    </div>

    <div class="chat-input">
      <input type="text" id="input-msg" placeholder="Escribe tu mensaje..." onkeydown="if(event.key==='Enter') enviarMensaje()">
      <button onclick="enviarMensaje()">Enviar</button>
    </div>

  </div>
</div>

<script>
  // Si quieres conectar una IA real, define esta URL con tu backend o servicio compatible.
  // Ejemplo: https://tu-backend.com/api/chat
  const AI_ENDPOINT = "";
  const AI_SYSTEM_PROMPT = "Eres una asesora de apoyo empática y segura. Responde con tacto, claridad y sin juzgar. Si el usuario menciona una emergencia, recomienda buscar ayuda inmediata y llamar a servicios de emergencia o a una persona de confianza.";

  const respuestas = [
    "Entiendo cómo te sientes. Estás en un lugar seguro.",
    "Gracias por contarme. ¿Hay algo específico que necesitas ahora mismo?",
    "Tu seguridad es lo más importante. ¿Estás en un lugar seguro en este momento?",
    "Recuerda que puedes llamar a la Línea 100 en cualquier momento.",
    "No estás sola/o. Tenemos recursos disponibles para ayudarte."
  ];

  const respuestasPorTema = {
    miedo: [
      "Respira lentamente conmigo: inhala por 4, exhala por 6. Estoy aquí contigo.",
      "Si te sientes insegura/o, puedes buscar ayuda inmediata y decirle a alguien cercano."
    ],
    ayuda: [
      "Estoy contigo. ¿Quieres que te ayude a encontrar un recurso o alguien de confianza?",
      "Puedo ayudarte a organizar tus próximos pasos, paso a paso."
    ],
    hablar: [
      "Gracias por compartirlo. Hablar contigo ya es un paso importante.",
      "Estoy escuchando con atención y sin juicio."
    ]
  };

  let rIdx = 0;

  function formatearHora() {
    return new Date().toLocaleTimeString("es-PE", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function mostrarIndicadorEscribiendo(mostrar) {
    const indicador = document.getElementById("typing-indicator");
    if (!indicador) return;
    indicador.style.display = mostrar ? "flex" : "none";
  }

  function agregarMensaje(texto, tipo) {
    const area = document.getElementById("chat-area");
    const burbuja = document.createElement("div");
    burbuja.className = `burbuja ${tipo}`;
    burbuja.innerHTML = `<span class="bubble-time">${formatearHora()}</span>${texto}`;
    area.appendChild(burbuja);
    area.scrollTop = area.scrollHeight;
  }

  function responderRapido(texto) {
    document.getElementById("input-msg").value = texto;
    enviarMensaje();
  }

  function obtenerRespuestaLocal(texto) {
    const mensaje = texto.toLowerCase();

    if (mensaje.includes("asust") || mensaje.includes("miedo") || mensaje.includes("temo")) {
      return respuestasPorTema.miedo[Math.floor(Math.random() * respuestasPorTema.miedo.length)];
    }

    if (mensaje.includes("ayuda") || mensaje.includes("urgente") || mensaje.includes("socorro")) {
      return respuestasPorTema.ayuda[Math.floor(Math.random() * respuestasPorTema.ayuda.length)];
    }

    if (mensaje.includes("hablar") || mensaje.includes("escuchar") || mensaje.includes("solo") || mensaje.includes("triste")) {
      return respuestasPorTema.hablar[Math.floor(Math.random() * respuestasPorTema.hablar.length)];
    }

    return respuestas[rIdx % respuestas.length];
  }

  async function obtenerRespuestaIA(texto) {
    if (!AI_ENDPOINT) return null;

    try {
      const respuesta = await fetch(AI_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: texto,
          systemPrompt: AI_SYSTEM_PROMPT
        })
      });

      if (!respuesta.ok) return null;

      const datos = await respuesta.json();

      return (
        datos.reply ||
        datos.response ||
        datos.message?.content ||
        datos.choices?.[0]?.message?.content ||
        null
      );
    } catch (error) {
      console.warn("No se pudo usar la IA:", error);
      return null;
    }
  }

  async function enviarMensaje() {
    const input = document.getElementById("input-msg");
    const texto = input.value.trim();
    if (!texto) return;

    agregarMensaje(texto, "usuario");
    input.value = "";
    mostrarIndicadorEscribiendo(true);

    const respuestaIA = await obtenerRespuestaIA(texto);
    const respuesta = respuestaIA || obtenerRespuestaLocal(texto);

    setTimeout(() => {
      agregarMensaje(respuesta, "asesor");
      rIdx++;
      mostrarIndicadorEscribiendo(false);
    }, respuestaIA ? 600 : 900);
  }
</script>

</body>
</html>
